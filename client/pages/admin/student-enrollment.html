<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Enrollment</title>
    <link rel="shortcut icon" href="./assets/images/logo.png" type="image/x-icon">
    <link rel="stylesheet" href="../../css/loader.css">
    <link rel="stylesheet" href="../../css/student-enrollment.css" />
    <link rel="stylesheet" href="../../css/table.css" />
    <link rel="stylesheet" href="../../css/modal.css" />
  </head>

  <body>
    <div class="page-container">
      <div class="page-header">
        <h1>Student Enrollment</h1>

        <button onclick="openModal()">+ Enroll Student</button>
      </div>

      <!-- Filters -->

      <div class="filter-container">
        <div class="filter-group">
          <label>Class</label>

          <select id="filterClass">
            <option value="">All Classes</option>
          </select>
        </div>

        <div class="filter-group">
          <label>Section</label>

          <select id="filterSection">
            <option value="">All Sections</option>
          </select>
        </div>
      </div>

      <table>
        <thead>
          <tr>
            <th>Roll No</th>

            <th>Admission No</th>

            <th>Student Name</th>

            <th>Session</th>

            <th>Class</th>

            <th>Section</th>

            <th>Action</th>
          </tr>
        </thead>

        <tbody id="enrollmentTable"></tbody>
      </table>
    </div>

    <!-- Add Enrollment Modal -->

    <div class="modal" id="enrollmentModal">
      <div class="modal-content">
        <h2>Enroll Student</h2>

        <label>Student</label>
        <select id="student"></select>

        <label>Session</label>
        <select id="session"></select>

        <label>Class</label>
        <select id="class"></select>

        <label>Section</label>
        <select id="section"></select>

        <label>Roll No</label>
        <input type="number" id="rollNo" min="1" />

        <div class="modal-buttons">
          <button id="saveBtn" onclick="createEnrollment()">Save</button>

          <button onclick="closeModal()">Cancel</button>
        </div>
      </div>
    </div>

    <script src="../../js/api.js"></script>
    <script src="../../js/loader.js"></script>
    <script src="../../js/dropdownService.js"></script>
    <script src="../../js/toast.js"></script>
    <script src="../../js/student-enrollment.js"></script>
  </body>
</html>
